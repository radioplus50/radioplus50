<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO TTS</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO TTS</h1>
<p>emisja trwa...</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let i = 0;
let running = false;
let timer = null;

const texts = [
  "jeden",
  "dwa",
  "trzy",
  "cztery",
  "pięć",
  "sześć",
  "siedem"
];

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pl-PL";
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

function loop() {
  if (!running) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

function start() {
  if (running) return;
  running = true;
  loop();
  timer = setInterval(loop, 3000);
}

function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
