<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Radio Plus 50</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h1>📻 RADIO PLUS 50</h1>

  <button onclick="play()">▶ PLAY</button>
  <button onclick="stop()">⏸ STOP</button>

  <audio id="radio" preload="none">
    <source src="https://stream-uk1.radioparadise.com/mp3-128" type="audio/mpeg">
  </audio>

  <script>
    const radio = document.getElementById("radio");

    function play() {
      radio.play();
    }

    function stop() {
      radio.pause();
      radio.currentTime = 0;
    }
  </script>

</body>
</html>
