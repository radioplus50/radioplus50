<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>200-głosowa emisja</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let i = 0;
let running = false;
let timer = null;

const texts = Array.from({length:200}, (_,i)=>`głos ${i+1}: jestem tutaj`);

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();

  if (voices.length) {
    u.voice = voices[Math.floor(Math.random()*voices.length)];
  }

  u.rate = 0.8 + Math.random()*0.4;
  u.pitch = 0.5 + Math.random()*0.8;
  u.lang = Math.random() > 0.5 ? "pl-PL" : "en-US";

  speechSynthesis.speak(u);
}

function loop() {
  if (!running) return;
  speak(texts[i]);
  i = (i + 1) % texts.length;
}

function start() {
  running = true;
  speechSynthesis.cancel();
  speechSynthesis.getVoices();
  setTimeout(()=>{
    loop();
    timer = setInterval(loop, 2000);
  },300);
}

function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
