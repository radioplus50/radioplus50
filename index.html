<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>200-głosowa emisja narracyjna</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let i = 0;
let running = false;
let timer = null;

/* 🧠 200 głosów */
const texts = Array.from({ length: 200 }, (_, i) => {
  return `głos ${i + 1}: jestem tutaj`;
});

/* 🔊 TTS z losowym głosem */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  if (voices.length > 0) {
    const v = voices[Math.floor(Math.random() * voices.length)];
    u.voice = v;
  }

  u.lang = Math.random() > 0.5 ? "pl-PL" : "en-US";
  u.rate = 0.7 + Math.random() * 0.6;
  u.pitch = 0.4 + Math.random() * 1.2;

  speechSynthesis.speak(u);
}

/* 🔁 emisja */
function loop() {
  if (!running) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

/* ▶ start */
function start() {
  if (running) return;
  running = true;

  speechSynthesis.cancel();
  speechSynthesis.getVoices();

  setTimeout(() => {
    loop();
    timer = setInterval(loop, 2000);
  }, 300);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
