<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>tryb awaryjny</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let i = 0;
let running = false;
let timer = null;

const texts = ["radio działa", "test", "emergency mode"];

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pl-PL";
  speechSynthesis.speak(u);
}

function loop() {
  if (!running) return;
  speak(texts[i]);
  i = (i + 1) % texts.length;
}

function start() {
  running = true;
  loop();
  timer = setInterval(loop, 3000);
}

function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
