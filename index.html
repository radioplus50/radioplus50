<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>emisja narracyjna</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let i = 0;
let running = false;
let timer = null;

const texts = [
  "głos pierwszy",
  "pamięć pierwsza",
  "obraz bez obrazu",
  "jestem tutaj",
  "nie wiem czy to trwa",
  "słyszenie",
  "powrót",
  "cisza mówi",
  "fragment",
  "echo",
  "ślad obecności",
  "narracja trwa"
];

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pl-PL";
  u.rate = 0.85;
  u.pitch = 1;
  speechSynthesis.speak(u);
}

function loop() {
  if (!running) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

function start() {
  if (running) return;
  running = true;

  speechSynthesis.cancel();

  setTimeout(() => {
    loop();
    timer = setInterval(loop, 3000);
  }, 300);
}

function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
