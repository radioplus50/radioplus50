<script>
let texts = [
  "test radio działa",
  "archiwum narracji uruchomione",
  "pamięć głosów",
  "emisja trwa"
];

let i = 0;
let running = false;
let timer = null;

/* 🔊 BLOKADA OBCEGO TTS */
function speak(text) {
  speechSynthesis.cancel(); // KLUCZ: zabija wszystko co zalega

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  // tylko polskie + twardy wybór
  const plVoices = voices.filter(v =>
    v.lang && v.lang.toLowerCase().startsWith("pl")
  );

  if (plVoices.length > 0) {
    u.voice = plVoices[0];
  } else {
    // jeśli brak PL, NIE pozwalamy EN fallback
    console.warn("Brak polskiego głosu!");
    return;
  }

  u.lang = "pl-PL";
  u.rate = 0.85;
  u.pitch = 0.9;

  u.onend = () => {
    // zapobiega nakładaniu się głosów
  };

  speechSynthesis.speak(u);
}

/* 🔁 emisja */
function loop() {
  if (!running) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

/* ▶ start */
function start() {
  if (running) return;

  running = true;
  i = 0;

  speechSynthesis.cancel();
  speechSynthesis.getVoices();

  loop();
  timer = setInterval(loop, 4000);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}

// init voices
speechSynthesis.onvoiceschanged = () => {};
speechSynthesis.getVoices();
</script>
