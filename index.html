<script>
let texts = ["radio działa", "test 1", "test 2"];
let i = 0;
let running = false;
let timer = null;

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pl-PL";
  speechSynthesis.speak(u);
}

function loop() {
  if (!running) return;
  speak(texts[i]);
  i = (i + 1) % texts.length;
}

function start() {
  running = true;
  loop();
  timer = setInterval(loop, 3000);
}

function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>
