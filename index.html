<script>
let texts = [];
let i = 0;
let running = false;
let timer = null;

let voices = [];

/* 🔧 WAŻNE: wymuszenie załadowania głosów */
function loadVoices() {
  voices = speechSynthesis.getVoices();
}

/* 🔊 TTS tylko PL */
function speak(text) {
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  loadVoices();

  // SZUKAMY TYLKO POLSKICH GŁOSÓW
  const plVoices = voices.filter(v => v.lang && v.lang.toLowerCase().includes("pl"));

  if (plVoices.length > 0) {
    u.voice = plVoices[Math.floor(Math.random() * plVoices.length)];
  }

  u.lang = "pl-PL";
  u.rate = 0.85;
  u.pitch = 0.9;

  speechSynthesis.speak(u);
}

/* 📦 JSON */
async function loadNarrations() {
  const res = await fetch('narracje.json?v=' + Date.now());
  const data = await res.json();
  texts = data.map(x => x.tekst);
}

/* 🔁 loop */
function loop() {
  if (!running || !texts.length) return;

  speak(texts[i]);
  i = (i + 1) % texts.length;
}

/* ▶ start */
async function start() {
  if (running) return;

  running = true;
  i = 0;

  speechSynthesis.cancel();

  loadVoices();

  await loadNarrations();

  loop();
  timer = setInterval(loop, 4500);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}

/* 🔧 WAŻNE: Chrome voice fix */
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
</script>
