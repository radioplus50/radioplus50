<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>Archiwum narracji biograficznych</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let texts = [];
let i = 0;
let running = false;
let timer = null;

/* 🔊 polski TTS */
function speak(text) {
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  // wybieramy tylko polski głos jeśli istnieje
  const plVoice =
    voices.find(v => v.lang && v.lang.includes("pl")) ||
    voices.find(v => v.lang && v.lang.includes("PL"));

  if (plVoice) {
    u.voice = plVoice;
  }

  u.lang = "pl-PL";
  u.rate = 0.85;
  u.pitch = 0.9;

  speechSynthesis.speak(u);
}

/* 📦 ładowanie narracji */
async function loadNarrations() {
  try {
    const res = await fetch('narracje.json?v=' + Date.now());
    const data = await res.json();

    texts = data.map(x => x.tekst);
  } catch (e) {
    texts = ["błąd ładowania archiwum narracji"];
    console.log(e);
  }
}

/* 🔁 emisja */
function loop() {
  if (!running || texts.length === 0) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

/* ▶ start */
async function start() {
  if (running) return;

  running = true;
  i = 0;

  speechSynthesis.cancel();

  await loadNarrations();

  loop();
  timer = setInterval(loop, 4000);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}

/* 🔧 inicjalizacja głosów */
speechSynthesis.getVoices();
</script>

</body>
</html>
