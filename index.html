<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>archiwum narracji</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let texts = [];
let i = 0;
let running = false;
let timer = null;

/* 🔊 TTS */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();
  if (voices.length) {
    u.voice = voices[Math.floor(Math.random() * voices.length)];
  }

  u.rate = 0.8 + Math.random() * 0.4;
  u.pitch = 0.5 + Math.random() * 0.8;
  u.lang = Math.random() > 0.5 ? "pl-PL" : "en-US";

  speechSynthesis.speak(u);
}

/* 📦 ładowanie narracji */
async function loadNarrations() {
  const res = await fetch('./narracje.json');
  const data = await res.json();
  texts = data.map(x => x.tekst);
}

/* 🔁 emisja */
function loop() {
  if (!running || texts.length === 0) return;

  speak(texts[i]);
  i = (i + 1) % texts.length;
}

/* ▶ start */
async function start() {
  if (running) return;

  running = true;
  i = 0;

  speechSynthesis.cancel();
  speechSynthesis.getVoices();

  await loadNarrations();

  loop();
  timer = setInterval(loop, 2500);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
