<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>RADIO PLUS 50</title>
</head>

<body style="background:black;color:white;font-family:monospace;text-align:center;">

<h1>RADIO PLUS 50</h1>
<p>tryb stabilny PL</p>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>
let texts = [
  "test radio działa",
  "archiwum narracji uruchomione",
  "pamięć głosów",
  "emisja trwa"
];

let i = 0;
let running = false;
let timer = null;

/* 🔊 ULTRA STABILNY TTS */
function speak(text) {
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);

  // NIE pobieramy voices → unikamy chaosu Chrome
  u.lang = "pl-PL";
  u.rate = 0.85;
  u.pitch = 0.9;

  // blokada dziwnych fallbacków
  u.voice = null;

  u.onerror = (e) => {
    console.log("TTS error:", e);
  };

  speechSynthesis.speak(u);
}

/* 🔁 emisja */
function loop() {
  if (!running) return;

  speak(texts[i]);

  i = (i + 1) % texts.length;
}

/* ▶ start */
function start() {
  if (running) return;

  running = true;
  i = 0;

  speechSynthesis.cancel();

  loop();
  timer = setInterval(loop, 4500);
}

/* ⛔ stop */
function stop() {
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}
</script>

</body>
</html>
